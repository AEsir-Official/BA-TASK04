name: Update market data and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: task04-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-web.txt

      - name: Install data dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: pip install -r requirements-web.txt

      - name: Refresh fixed stock pool
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python scripts/update_market_data.py

      - name: Commit refreshed data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          if git diff --quiet -- data/market_data.json data/stocks; then
            echo "No market data changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/market_data.json data/stocks
            git commit -m "chore(data): refresh daily market data"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

